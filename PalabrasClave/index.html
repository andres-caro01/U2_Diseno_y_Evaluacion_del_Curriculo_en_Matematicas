<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Currículo: The Definition of Insanity</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');

        :root {
            --fc-orange: #ff4e00;
            --fc-yellow: #ffcc00;
            --fc-red: #cc0000;
        }

        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at center, rgba(255, 78, 0, 0.07) 0%, transparent 70%),
                url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
            text-transform: uppercase;
        }

        .word-cloud {
            position: relative;
            max-width: 1000px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 20px;
            transform: rotate(-1deg);
        }

        .word {
            position: relative;
            cursor: pointer;
            transition: all 0.15s ease;
            animation: entry 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
            letter-spacing: 1px;
            display: inline-block;
            user-select: none;
        }

        /* Jerarquía de tamaños para simular nube */
        .w-main { font-size: 4.5rem; color: #fff; z-index: 5; }
        .w-med { font-size: 3rem; color: #ddd; opacity: 0.9; }
        .w-small { font-size: 1.8rem; color: #aaa; opacity: 0.7; }

        /* Efecto de Hover Psicodélico / Glitch */
        .word:hover {
            color: var(--fc-yellow) !important;
            opacity: 1 !important;
            transform: scale(1.15) skewX(-15deg);
            text-shadow: 
                -4px 0 var(--fc-red), 
                4px 0 var(--fc-orange);
            filter: brightness(1.3);
            z-index: 100;
        }

        /* Animación de entrada con desenfoque */
        @keyframes entry {
            0% {
                opacity: 0;
                transform: scale(2) translateY(50px);
                filter: blur(20px) brightness(2);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0) brightness(1);
            }
        }

        /* Glitch aleatorio en algunas palabras */
        .glitch-effect {
            animation: glitch-anim 5s infinite step-end;
        }

        @keyframes glitch-anim {
            0%, 90%, 100% { transform: none; filter: none; }
            91% { transform: skew(10deg); filter: invert(1); }
            92% { transform: translateX(-10px); color: var(--fc-red); }
            95% { transform: skew(-10deg); filter: blur(2px); }
        }

        /* Decoración de fondo */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url(https://media.giphy.com/media/oEI9uWUic8S1W/giphy.gif);
            opacity: 0.03;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="noise"></div>

    <div class="word-cloud">
        <span class="word w-main glitch-effect" style="animation-delay: 0.1s;">Historia curricular</span>
        <span class="word w-med" style="animation-delay: 0.3s;">nuevo currículo</span>
        <span class="word w-main" style="animation-delay: 0.2s;">matemática moderna</span>
        <span class="word w-med glitch-effect" style="animation-delay: 0.5s;">crisis de la matemática moderna</span>
        <span class="word w-small" style="animation-delay: 0.4s;">estándares de matemáticas</span>
        <span class="word w-main" style="animation-delay: 0.6s;">reforma curricular</span>
    </div>

</body>
</html>
