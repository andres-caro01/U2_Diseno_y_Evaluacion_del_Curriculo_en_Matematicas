<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruta de Aprendizaje Matemática</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #6366f1;
            --accent: #8b5cf6;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            color: #1e293b;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .row {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--box-shadow);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            opacity: 0; /* Para la animación de entrada */
            animation: slideInRight 0.8s ease forwards;
        }

        /* Delay para cada fila */
        .row:nth-child(1) { animation-delay: 0.2s; }
        .row:nth-child(2) { animation-delay: 0.4s; }
        .row:nth-child(3) { animation-delay: 0.6s; }

        .row:hover {
            transform: scale(1.02) translateX(10px);
            background: #ffffff;
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.2);
        }

        .box {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            flex-shrink: 0;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            margin-right: 30px;
        }

        /* Dimensiones dinámicas inspiradas en la imagen */
        .row-1 .box { width: 140px; height: 90px; }
        .row-2 .box { width: 280px; height: 110px; }
        .row-3 .box { width: 420px; height: 140px; }

        /* Efecto de redimensión al hacer hover */
        .row:hover .box {
            border-radius: 50px;
            letter-spacing: 5px;
        }

        .content {
            flex-grow: 1;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #1e293b, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #64748b;
            line-height: 1.4;
        }

        /* Animación personalizada */
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px) skewX(-10deg);
            }
            to {
                opacity: 1;
                transform: translateX(0) skewX(0deg);
            }
        }

        /* Responsividad */
        @media (max-width: 850px) {
            .row { flex-direction: column; text-align: center; }
            .box { margin-right: 0; margin-bottom: 20px; width: 100% !important; }
            .row-3 .box { width: 100% !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row row-1">
        <div class="box">1</div>
        <div class="content">
            <h2 class="title">Patrones y secuencias</h2>
            <p class="subtitle">Primaria • Reconocimiento de la variación discreta.</p>
        </div>
    </div>

    <div class="row row-2">
        <div class="box">2</div>
        <div class="content">
            <h2 class="title">Tablas y gráficas</h2>
            <p class="subtitle">Básica Secundaria • Representación de la dependencia funcional.</p>
        </div>
    </div>

    <div class="row row-3">
        <div class="box">3</div>
        <div class="content">
            <h2 class="title">Modelos algebraicos y analíticos</h2>
            <p class="subtitle">Media • Formalización de funciones y conceptos de cambio (límite y derivada).</p>
        </div>
    </div>
</div>

</body>
</html>
